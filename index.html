<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天多一題，明天多一分 — 答案總覽</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #fdf6e3;
    --warm: #f5e6c8;
    --accent: #c0392b;
    --gold: #d4a843;
    --sage: #5a7a52;
    --light-sage: #e8f0e6;
    --border: #c8b89a;
    --shadow: rgba(26,18,8,0.10);
    --r1: #3b6ea5;
    --r2: #5a7a52;
    --r3: #8b5a2b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background-color: var(--paper);
    background-image:
      radial-gradient(ellipse at 15% 10%, rgba(212,168,67,0.09) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 90%, rgba(90,122,82,0.07) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23c8b89a' fill-opacity='0.07'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
    padding-bottom: 120px;
  }

  /* ── TOP HEADER ── */
  .top-header {
    background: white;
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, var(--gold), var(--accent), var(--sage)) 1;
    padding: 28px 24px 22px;
    text-align: center;
    box-shadow: 0 2px 16px var(--shadow);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 4px 16px;
    border-radius: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .main-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.3;
  }

  .sub-title {
    font-size: 13px;
    color: #7a6a55;
    letter-spacing: 2px;
    margin-top: 6px;
  }

  /* ── CONTENT ── */
  .content {
    max-width: 860px;
    margin: 36px auto 0;
    padding: 0 20px;
  }

  /* ── ROUND SECTION ── */
  .round-section { margin-bottom: 40px; }

  .round-title {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .round-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 900;
    color: white;
    padding: 4px 18px;
    border-radius: 4px;
  }

  .r1-label { background: var(--r1); }
  .r2-label { background: var(--r2); }
  .r3-label { background: var(--r3); }

  .round-line {
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  /* ── ANSWER TABLE ── */
  .answer-table {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: white;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px 6px;
    border-right: 1px solid #e8dcc8;
    border-bottom: 1px solid #e8dcc8;
  }

  .cell:nth-child(10n) { border-right: none; }
  .cell:nth-last-child(-n+10) { border-bottom: none; }

  .cell-num {
    font-size: 11px;
    color: #aaa;
    font-weight: 500;
    margin-bottom: 5px;
    line-height: 1;
  }

  .cell-ans {
    font-size: 20px;
    font-weight: 900;
    font-family: 'Noto Serif TC', serif;
    line-height: 1;
  }

  .r1 .cell-ans { color: var(--r1); }
  .r2 .cell-ans { color: var(--r2); }
  .r3 .cell-ans { color: var(--r3); }

  /* ── MAGIC MIRROR ── */
  .magic-mirror {
    max-width: 560px;
    margin: 0 auto 40px;
    background: var(--light-sage);
    border: 1.5px dashed #a8c4a0;
    border-radius: 10px;
    padding: 20px 28px;
    text-align: center;
  }

  .magic-mirror::before {
    content: '🪄';
    font-size: 20px;
    display: block;
    margin-bottom: 10px;
  }

  .magic-mirror p {
    font-family: 'Noto Serif TC', serif;
    font-size: 13.5px;
    line-height: 2.1;
    color: #4a6a42;
  }

  .hl { color: var(--accent); font-weight: 700; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 2px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: center;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 20;
  }

  .btn-open {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 48px;
    background: linear-gradient(135deg, var(--accent) 0%, #8b1a1a 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(192,57,43,0.4);
  }

  .btn-open:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(192,57,43,0.5); }
  .btn-open:active { transform:translateY(0); }

  @media (max-width: 600px) {
    .answer-table { grid-template-columns: repeat(5, 1fr); }
    .cell:nth-child(10n) { border-right: 1px solid #e8dcc8; }
    .cell:nth-child(5n) { border-right: none; }
    .cell:nth-last-child(-n+10) { border-bottom: 1px solid #e8dcc8; }
    .cell:nth-last-child(-n+5) { border-bottom: none; }
    .cell-ans { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="top-header">
  <div class="header-badge">📋 Answer Key</div>
  <h1 class="main-title">今天多一題，明天多一分</h1>
  <p class="sub-title">片語練習卷 — 答案總覽</p>
</div>

<div class="content" id="answer-content"></div>

<div style="max-width:860px;margin:0 auto;padding:0 20px 32px">
  <div class="magic-mirror">
    <p>
      魔鏡啊魔鏡，世界上最漂亮的英文老師是誰？<br>
      當然是你們的英文老師 <span class="hl">Edwina</span> ><span class="hl"><</span><br>
      魔鏡啊魔鏡，世界上最認真的學生是誰？<br>
      是正在查解析 <span class="hl">訂正題目</span> 的你！
    </p>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-open" onclick="window.open('片語練習解析查詢.html','_blank','width=820,height=920,scrollbars=yes,resizable=yes')">
    🔍 點我查詢解析
  </button>
</div>

<script>
const ANSWERS = {
  "第一回": ["A","C","D","B","D","A","B","A","C","B","A","C","C","D","B","B","A","B","A","B","A","D","A","B","C","B","D","C","C","A"],
  "第二回": ["D","C","B","D","A","C","A","B","D","B","C","B","A","A","D","B","D","C","A","C","D","A","C","A","B","A","D","D","B","B"],
  "第三回": ["C","D","B","A","D","C","C","B","A","B","D","C","A","A","D","B","D","D","C","B","A","C","D","A","A","C","A","B","D","A"],
};

const ROUND_INFO = [
  { round:"第一回", cls:"r1", labelCls:"r1-label" },
  { round:"第二回", cls:"r2", labelCls:"r2-label" },
  { round:"第三回", cls:"r3", labelCls:"r3-label" },
];

const container = document.getElementById('answer-content');

ROUND_INFO.forEach(({round, cls, labelCls}) => {
  const section = document.createElement('div');
  section.className = 'round-section';

  section.innerHTML = `
    <div class="round-title">
      <span class="round-label ${labelCls}">${round}</span>
      <div class="round-line"></div>
    </div>
  `;

  const table = document.createElement('div');
  table.className = `answer-table ${cls}`;

  ANSWERS[round].forEach((ans, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.innerHTML = `<div class="cell-num">${i+1}</div><div class="cell-ans">${ans}</div>`;
    table.appendChild(cell);
  });

  section.appendChild(table);
  container.appendChild(section);
});
</script>
</body>
</html>
