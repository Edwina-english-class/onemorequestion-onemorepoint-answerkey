<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天多一題，明天多一分</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:wght@700;900&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #fdf6e3;
    --warm: #f5e6c8;
    --accent: #c0392b;
    --gold: #d4a843;
    --sage: #5a7a52;
    --light-sage: #e8f0e6;
    --border: #c8b89a;
    --shadow: rgba(26, 18, 8, 0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--paper);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(212,168,67,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(90,122,82,0.06) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c8b89a' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    min-height: 100vh;
    font-family: 'Noto Sans TC', sans-serif;
    color: var(--ink);
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ── QUERY PAGE ── */
  #query-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px;
  }

  .header { text-align: center; margin-bottom: 36px; }

  .header-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    padding: 5px 18px;
    border-radius: 2px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .main-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 900;
    color: var(--ink);
    line-height: 1.3;
  }

  .main-title::after {
    content: '';
    display: block;
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--accent));
    margin: 14px auto 0;
  }

  .sub-title {
    font-size: 15px;
    color: #7a6a55;
    letter-spacing: 2px;
    margin-top: 16px;
  }

  /* ── CARD ── */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 8px 40px var(--shadow), 0 2px 8px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--gold), var(--accent), var(--sage));
  }

  .field-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    color: #8a7a65;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .total-badge {
    display: inline-block;
    background: var(--light-sage);
    color: var(--sage);
    font-size: 11px;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
    transition: background 0.2s, color 0.2s;
  }

  .total-badge.full {
    background: #fff0f0;
    color: var(--accent);
  }

  .field-hint {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 16px;
    letter-spacing: 0.3px;
  }

  /* ── ROUND PANELS ── */
  .round-panels {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 8px;
  }

  .round-panel {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .round-panel.has-selection {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px rgba(212,168,67,0.15);
  }

  .round-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: var(--warm);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .round-header:hover { background: #f0ddb8; }

  .round-checkbox {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.18s;
    background: white;
    font-size: 11px;
    font-weight: 700;
  }

  .round-checkbox.checked {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }

  .round-name {
    font-family: 'Noto Serif TC', serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--ink);
    flex: 1;
  }

  .round-count {
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    min-width: 50px;
    text-align: right;
  }

  .round-arrow {
    font-size: 12px;
    color: #aaa;
    transition: transform 0.2s;
  }

  .round-arrow.open { transform: rotate(180deg); }

  .round-body {
    padding: 0 16px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
  }

  .round-body.open {
    max-height: 200px;
    padding: 14px 16px 16px;
  }

  /* ── NUMBER CHIPS ── */
  .num-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .num-chip {
    width: 36px; height: 36px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    background: white;
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    user-select: none;
    display: flex; align-items: center; justify-content: center;
    font-weight: 500;
  }

  .num-chip:hover:not(.disabled) { border-color: var(--gold); color: var(--gold); }

  .num-chip.selected {
    background: var(--gold);
    border-color: var(--gold);
    color: white;
    font-weight: 700;
  }

  .num-chip.disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* ── SUMMARY ── */
  .summary-row {
    margin-top: 18px;
    padding: 12px 14px;
    background: var(--light-sage);
    border-radius: 8px;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .summary-tag {
    background: white;
    border: 1px solid #a8c4a0;
    border-radius: 14px;
    padding: 3px 10px 3px 10px;
    font-size: 12px;
    color: var(--ink);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; gap: 5px;
  }

  .summary-tag:hover { background: #ffe8e8; border-color: #e8a0a0; }
  .summary-tag .x { color: #c0392b; font-size: 11px; font-weight: 700; }

  .summary-empty {
    color: #bbb;
    font-size: 12px;
    font-style: italic;
    width: 100%;
    text-align: center;
  }

  /* ── ERROR ── */
  .error-msg {
    display: none;
    background: #fff5f5;
    border: 1.5px solid #ffcccc;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 13px;
    color: var(--accent);
    margin-top: 14px;
    text-align: center;
    letter-spacing: 0.5px;
  }

  /* ── BUTTON ── */
  .btn-query {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent) 0%, #8b1a1a 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(192,57,43,0.35);
    margin-top: 20px;
  }

  .btn-query:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.4); }
  .btn-query:active { transform: translateY(0); }

  /* ── MAGIC MIRROR ── */
  .magic-mirror {
    max-width: 600px;
    width: 100%;
    margin-top: 30px;
    background: var(--light-sage);
    border: 1.5px dashed #a8c4a0;
    border-radius: 10px;
    padding: 20px 28px;
    text-align: center;
  }

  .magic-mirror::before {
    content: '🪄';
    font-size: 22px;
    display: block;
    margin-bottom: 10px;
  }

  .magic-mirror p {
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    line-height: 2.1;
    color: #4a6a42;
  }

  .hl { color: var(--accent); font-weight: 700; }

  /* ── RESULT PAGE ── */
  #result-page {
    min-height: 100vh;
    padding: 40px 20px 80px;
    max-width: 700px;
    margin: 0 auto;
  }

  .result-header {
    text-align: center;
    margin-bottom: 36px;
    padding-bottom: 22px;
    border-bottom: 2px solid var(--border);
  }

  .result-title {
    font-family: 'Playfair Display', 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--ink);
  }

  .result-subtitle {
    font-size: 13px;
    color: #9a8a75;
    margin-top: 8px;
    letter-spacing: 1px;
    line-height: 1.8;
  }

  .question-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 26px 30px;
    margin-bottom: 18px;
    box-shadow: 0 4px 20px var(--shadow);
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-label { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }

  .q-round-badge {
    background: var(--sage);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    letter-spacing: 1.5px;
  }

  .q-num-badge {
    background: var(--gold);
    color: white;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 4px;
  }

  .q-translation {
    font-size: 15px;
    color: #5a5040;
    line-height: 1.85;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--warm);
    border-radius: 6px;
    border-left: 3px solid var(--gold);
  }

  .q-section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #9a8a75;
    margin-bottom: 7px;
    margin-top: 13px;
  }

  .q-answer {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Noto Serif TC', serif;
    line-height: 1.7;
  }

  .q-others {
    font-size: 14px;
    color: #7a6a55;
    line-height: 1.7;
    margin-top: 6px;
    padding: 10px 14px;
    background: #f9f6f0;
    border-radius: 6px;
  }

  .btn-reset {
    display: block;
    margin: 32px auto 0;
    padding: 15px 44px;
    background: white;
    border: 2px solid var(--ink);
    border-radius: 8px;
    font-family: 'Noto Serif TC', serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.2s;
    box-shadow: 4px 4px 0 var(--ink);
  }

  .btn-reset:hover {
    background: var(--ink);
    color: white;
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--gold);
  }

  .btn-reset:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

  @media (max-width: 480px) {
    .card { padding: 24px 16px; }
    .question-card { padding: 20px 16px; }
    .num-chip { width: 32px; height: 32px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- QUERY PAGE -->
<div id="query-page" class="page active">
  <div class="header">
    <div class="header-badge">📖 English Practice</div>
    <h1 class="main-title">今天多一題，明天多一分</h1>
    <p class="sub-title">片語練習卷解析查詢</p>
  </div>

  <div class="card">
    <div class="field-label">
      選擇回數與題號
      <span class="total-badge" id="total-badge">已選 0 題</span>
    </div>
    <p class="field-hint">可跨回合選題 · 展開各回合點選題號 · 最多共選 <strong style="color:var(--accent)">5 題</strong></p>

    <div class="round-panels" id="round-panels"></div>

    <div class="summary-row" id="summary-row">
      <span class="summary-empty">尚未選擇任何題目</span>
    </div>

    <div class="error-msg" id="error-msg"></div>

    <button class="btn-query" onclick="handleQuery()">查詢解析</button>
  </div>

  <div class="magic-mirror">
    <p>
      魔鏡啊魔鏡，世界上最漂亮的英文老師是誰？<br>
      當然是你們的英文老師 <span class="hl">Edwina</span> ><span class="hl"><</span><br>
      魔鏡啊魔鏡，世界上最漂亮、最帥氣的學生是誰？<br>
      是正在查解析 <span class="hl">訂正題目</span> 的你！
    </p>
  </div>
</div>

<!-- RESULT PAGE -->
<div id="result-page" class="page">
  <div class="result-header">
    <div class="result-title">片語解析結果</div>
    <div class="result-subtitle" id="result-subtitle"></div>
  </div>
  <div id="result-list"></div>
  <button class="btn-reset" onclick="resetQuery()">點我重新查詢</button>
</div>

<script>
const DATA = [
  {回數:"第一回",題號:1,翻譯:"你可以幫我一個忙嗎？幫我拿把傘，因為外面正在下雨。",解析:"(A) do me a favor: 幫我個忙",其他:"(B) 出現；(C) 贈送/分發；(D) 轉身"},
  {回數:"第一回",題號:2,翻譯:"越來越多人在家養寵物。貓和狗在台灣很常見。",解析:"(C) keep pets: 養寵物",其他:"(A) 賺錢；(B) 去旅行；(D) 到處走走"},
  {回數:"第一回",題號:3,翻譯:"讓我們為他唱了這麼棒的歌給我們聽而熱烈鼓掌。",解析:"(D) give him a big hand: 為某人鼓掌",其他:"(A) 讓他歇會；(B) 幫他一把；(C) 打給他"},
  {回數:"第一回",題號:4,翻譯:"Tim 得到新東西時喜歡向同學炫耀。這就是他不受歡迎的原因。",解析:"(B) show off: 炫耀",其他:"(A) 拒絕；(C) 填寫；(D) 繼續"},
  {回數:"第一回",題號:5,翻譯:"請把音樂關小聲一點，因為你小弟弟正在臥室睡覺。",解析:"(D) turn down: 關小聲/拒絕",其他:"(A) 開大聲；(B) 結果是；(C) 繳交"},
  {回數:"第一回",題號:6,翻譯:"我很想參加你們的感恩節晚餐，但我最近在節食，不能吃太多。",解析:"(A) on a diet: 節食中",其他:"其他選項 (B, C, D) 介系詞或語法錯誤"},
  {回數:"第一回",題號:7,翻譯:"你去哪了？3小時前接到電話後你都沒出現。",解析:"(B) show up: 出現",其他:"(A) 結果是；(C) 填滿；(D) 出現/出版"},
  {回數:"第一回",題號:8,翻譯:"在你買這個昂貴的東西前，我覺得你應該考慮清楚。",解析:"(A) think it over: 仔細考慮",其他:"(B) 帶某人參觀；(C) 複習/檢查；(D) 贈送"},
  {回數:"第一回",題號:9,翻譯:"進入房間前請脫掉鞋子，否則房間很快會變髒。",解析:"(C) take off: 脫掉/起飛",其他:"(A) 尋找；(B) 出現/出版；(D) 找出"},
  {回數:"第一回",題號:10,翻譯:"也許我們需要報警。我想我們在森林裡迷路了。",解析:"(B) get lost: 迷路",其他:"(A) 聚會；(C) 下車；(D) 離開/逃避"},
  {回數:"第一回",題號:11,翻譯:"為了保持身材，Sarah每天晚餐只吃一碗沙拉。那讓她變苗條。",解析:"(A) keep fit: 保持身材",其他:"(B) 許願；(C) 去旅行；(D) 遛狗"},
  {回數:"第一回",題號:12,翻譯:"熬夜對健康不好。我們需要充足睡眠否則會在課堂打瞌睡。",解析:"(C) Staying up: 熬夜",其他:"(A) 吃藥；(B) 寫日記；(D) 賺錢"},
  {回數:"第一回",題號:13,翻譯:"我今晚需要些好衣服穿。我要和Mike在一間很棒的餐廳約會。",解析:"(C) date with: 與...約會",其他:"(A) 許願；(B) 查閱；(D) 下車"},
  {回數:"第一回",題號:14,翻譯:"加入社團前，我們必須填好紙上的資訊。",解析:"(D) fill out: 填寫",其他:"(A) 出現；(B) 找出；(C) 結果是"},
  {回數:"第一回",題號:15,翻譯:"A: 這件洋裝你穿很好看。你想試穿看看嗎？ B: 好。",解析:"(B) to try it on: 試穿",其他:"(A) 脫掉；(C) 保持身材；(D) 查閱"},
  {回數:"第一回",題號:16,翻譯:"A: 你今天看起來不同。臉上加了什麼嗎？ B: 也許是因為這件洋裝跟我的頭髮很搭。",解析:"(B) goes with: 與...相配",其他:"(A) 到處走動；(C) 隨同/進展；(D) 變成"},
  {回數:"第一回",題號:17,翻譯:"我的父親經歷過艱難的時光，最後變得成功。",解析:"(A) experienced: 經歷",其他:"(B) 旅遊；(C) 出現；(D) 看 (see)過去式"},
  {回數:"第一回",題號:18,翻譯:"當 Jane 在公園慢跑時，她在樹下偶然發現一隻小狗。",解析:"(B) met: 遇見",其他:"(A) 餵食；(C) 拯救；(D) 殺害"},
  {回數:"第一回",題號:19,翻譯:"經過仔細的規劃，這棟舊房子被改造成一座博物館。",解析:"(A) changed: 改變、變得",其他:"(B) 畫；(C) 漆/畫；(D) 告訴"},
  {回數:"第一回",題號:20,翻譯:"我不知道這個單字的意思。我需要一本字典來查閱它。",解析:"(B) check: 檢查、核對",其他:"(A) 回答；(C) 寫字；(D) 攜帶"},

const ROUNDS = ["第一回","第二回","第三回"];
const MAX = 5;
const selections = { "第一回": new Set(), "第二回": new Set(), "第三回": new Set() };
const openState = { "第一回": false, "第二回": false, "第三回": false };

function totalSelected() {
  return ROUNDS.reduce((s, r) => s + selections[r].size, 0);
}

function buildPanels() {
  const container = document.getElementById('round-panels');
  container.innerHTML = '';
  ROUNDS.forEach(round => {
    const panel = document.createElement('div');
    panel.className = 'round-panel';
    panel.id = 'panel-' + round;

    const header = document.createElement('div');
    header.className = 'round-header';
    header.onclick = () => togglePanel(round);
    header.innerHTML = `
      <div class="round-checkbox" id="chk-${round}"></div>
      <span class="round-name">${round}</span>
      <span class="round-count" id="cnt-${round}"></span>
      <span class="round-arrow" id="arrow-${round}">▾</span>
    `;

    const body = document.createElement('div');
    body.className = 'round-body';
    body.id = 'body-' + round;

    const grid = document.createElement('div');
    grid.className = 'num-grid';
    for (let i = 1; i <= 30; i++) {
      const chip = document.createElement('button');
      chip.className = 'num-chip';
      chip.id = `chip-${round}-${i}`;
      chip.textContent = i;
      chip.onclick = () => toggleChip(round, i);
      grid.appendChild(chip);
    }
    body.appendChild(grid);
    panel.appendChild(header);
    panel.appendChild(body);
    container.appendChild(panel);
  });
}

function togglePanel(round) {
  openState[round] = !openState[round];
  document.getElementById('body-' + round).classList.toggle('open', openState[round]);
  document.getElementById('arrow-' + round).classList.toggle('open', openState[round]);
}

function toggleChip(round, num) {
  const set = selections[round];
  if (set.has(num)) {
    set.delete(num);
    document.getElementById(`chip-${round}-${num}`).classList.remove('selected');
  } else {
    if (totalSelected() >= MAX) { showError(`最多只能選 ${MAX} 題喔！`); return; }
    set.add(num);
    document.getElementById(`chip-${round}-${num}`).classList.add('selected');
  }
  clearError();
  refreshUI();
}

function refreshUI() {
  const total = totalSelected();
  const badge = document.getElementById('total-badge');
  badge.textContent = `已選 ${total} 題`;
  badge.classList.toggle('full', total >= MAX);

  ROUNDS.forEach(round => {
    const cnt = selections[round].size;
    document.getElementById('cnt-' + round).textContent = cnt > 0 ? `已選 ${cnt} 題` : '';
    document.getElementById('chk-' + round).classList.toggle('checked', cnt > 0);
    document.getElementById('chk-' + round).textContent = cnt > 0 ? '✓' : '';
    document.getElementById('panel-' + round).classList.toggle('has-selection', cnt > 0);
    for (let i = 1; i <= 30; i++) {
      const chip = document.getElementById(`chip-${round}-${i}`);
      if (chip) chip.classList.toggle('disabled', total >= MAX && !selections[round].has(i));
    }
  });

  updateSummary();
}

function updateSummary() {
  const row = document.getElementById('summary-row');
  row.innerHTML = '';
  const total = totalSelected();
  if (total === 0) {
    row.innerHTML = '<span class="summary-empty">尚未選擇任何題目</span>';
    return;
  }
  ROUNDS.forEach(round => {
    [...selections[round]].sort((a,b)=>a-b).forEach(n => {
      const tag = document.createElement('span');
      tag.className = 'summary-tag';
      tag.title = '點擊取消選取';
      tag.innerHTML = `${round} 第${n}題 <span class="x">✕</span>`;
      tag.onclick = () => toggleChip(round, n);
      row.appendChild(tag);
    });
  });
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError() {
  document.getElementById('error-msg').style.display = 'none';
}

function handleQuery() {
  clearError();
  if (totalSelected() === 0) { showError('請先展開回合並選擇至少一道題目！'); return; }

  const results = [];
  ROUNDS.forEach(round => {
    [...selections[round]].sort((a,b)=>a-b).forEach(n => {
      const item = DATA.find(d => d.回數 === round && d.題號 === n);
      if (item) results.push(item);
    });
  });

  const groups = ROUNDS
    .filter(r => selections[r].size > 0)
    .map(r => `${r}：第 ${[...selections[r]].sort((a,b)=>a-b).join('、')} 題`)
    .join('　');

  document.getElementById('result-subtitle').textContent = `共 ${results.length} 題｜${groups}`;

  const list = document.getElementById('result-list');
  list.innerHTML = '';
  results.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    card.style.animationDelay = (i * 0.07) + 's';
    card.innerHTML = `
      <div class="q-label">
        <span class="q-round-badge">${item.回數}</span>
        <span class="q-num-badge">第 ${item.題號} 題</span>
      </div>
      <div class="q-translation">${item.翻譯}</div>
      <div class="q-section-title">✅ 正確答案與解析</div>
      <div class="q-answer">${item.解析}</div>
      <div class="q-section-title">❌ 其他選項</div>
      <div class="q-others">${item.其他}</div>
    `;
    list.appendChild(card);
  });

  document.getElementById('query-page').classList.remove('active');
  document.getElementById('result-page').classList.add('active');
  window.scrollTo(0, 0);
}

function resetQuery() {
  ROUNDS.forEach(r => { selections[r].clear(); openState[r] = false; });
  clearError();
  buildPanels();
  refreshUI();
  document.getElementById('result-page').classList.remove('active');
  document.getElementById('query-page').classList.add('active');
  window.scrollTo(0, 0);
}

buildPanels();
refreshUI();
</script>
</body>
</html>
